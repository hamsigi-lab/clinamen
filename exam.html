<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시험지 오류 검사 — 선생님 도구</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f8fafc; color: #1a1a2e; min-height: 100vh;
    }
    header {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 14px 24px; display: flex; align-items: center; gap: 12px;
    }
    header a { text-decoration: none; color: #64748b; font-size: 14px; }
    header a:hover { color: #2563eb; }
    header h1 { font-size: 16px; font-weight: 700; color: #1a1a2e; }
    .container { max-width: 760px; margin: 0 auto; padding: 32px 20px; }
    .section-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .section-desc { font-size: 14px; color: #64748b; margin-bottom: 24px; }

    .upload-area {
      border: 2px dashed #cbd5e1; border-radius: 14px;
      padding: 40px 24px; text-align: center;
      background: #fff; cursor: pointer;
      transition: all 0.2s; margin-bottom: 16px;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #2563eb; background: #eff6ff; }
    .upload-area .icon { font-size: 40px; margin-bottom: 12px; }
    .upload-area p { font-size: 15px; color: #475569; margin-bottom: 6px; }
    .upload-area span { font-size: 13px; color: #94a3b8; }
    #fileInput { display: none; }

    .or-divider {
      text-align: center; color: #94a3b8; font-size: 13px;
      margin: 16px 0; position: relative;
    }
    .or-divider::before, .or-divider::after {
      content: ''; position: absolute; top: 50%;
      width: 44%; height: 1px; background: #e2e8f0;
    }
    .or-divider::before { left: 0; }
    .or-divider::after { right: 0; }

    textarea {
      width: 100%; min-height: 180px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      padding: 14px; font-size: 14px; font-family: inherit;
      resize: vertical; outline: none; transition: border-color 0.2s;
      background: #fff;
    }
    textarea:focus { border-color: #2563eb; }
    textarea::placeholder { color: #cbd5e1; }

    .info-row {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .info-row select, .info-row input {
      flex: 1; min-width: 140px;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      padding: 10px 12px; font-size: 14px; font-family: inherit;
      outline: none; background: #fff;
    }
    .info-row select:focus, .info-row input:focus { border-color: #2563eb; }

    .btn-primary {
      width: 100%; padding: 14px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: background 0.2s; margin-top: 4px;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }

    .privacy-note {
      font-size: 12px; color: #22c55e;
      text-align: center; margin-top: 10px;
    }

    .result-box {
      margin-top: 28px; background: #fff;
      border: 1px solid #e2e8f0; border-radius: 14px;
      overflow: hidden; display: none;
    }
    .result-header {
      padding: 16px 20px; background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex; justify-content: space-between; align-items: center;
    }
    .result-header h3 { font-size: 15px; font-weight: 700; }
    .result-body { padding: 20px; }

    .issue-item {
      padding: 14px 16px; border-radius: 10px;
      margin-bottom: 10px; border-left: 4px solid;
    }
    .issue-high { background: #fef2f2; border-color: #ef4444; }
    .issue-mid  { background: #fffbeb; border-color: #f59e0b; }
    .issue-low  { background: #eff6ff; border-color: #3b82f6; }
    .issue-ok   { background: #f0fdf4; border-color: #22c55e; }

    .issue-label {
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      display: inline-block; margin-bottom: 6px;
    }
    .issue-high .issue-label { background: #fee2e2; color: #dc2626; }
    .issue-mid  .issue-label { background: #fef3c7; color: #d97706; }
    .issue-low  .issue-label { background: #dbeafe; color: #2563eb; }
    .issue-ok   .issue-label { background: #dcfce7; color: #16a34a; }

    .issue-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .issue-desc  { font-size: 13px; color: #475569; line-height: 1.6; }

    .loading-msg {
      text-align: center; padding: 32px;
      color: #64748b; font-size: 14px; display: none;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e2e8f0;
      border-top-color: #2563eb; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 10px; padding: 14px 16px;
      color: #dc2626; font-size: 14px; margin-top: 16px; display: none;
    }
    .file-name {
      font-size: 13px; color: #2563eb; background: #eff6ff;
      border-radius: 6px; padding: 6px 12px;
      margin-bottom: 12px; display: none;
    }
    .copy-btn {
      padding: 6px 14px; background: #f8fafc;
      border: 1px solid #e2e8f0; border-radius: 6px;
      font-size: 12px; cursor: pointer; transition: all 0.15s;
    }
    .copy-btn:hover { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
  </style>
</head>
<body>

<header>
  <a href="/">← 홈</a>
  <h1>📝 시험지 오류 검사</h1>
</header>

<div class="container">
  <div class="section-title">시험지 오류 검사</div>
  <div class="section-desc">PDF 업로드 또는 텍스트 붙여넣기 — 파일은 내 PC에서만 처리됩니다</div>

  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📄</div>
    <p>PDF 파일을 여기에 드래그하거나 클릭해서 선택</p>
    <span>지원 형식: PDF · 최대 20MB</span>
  </div>
  <input type="file" id="fileInput" accept=".pdf" onchange="handleFile(this.files[0])">
  <div class="file-name" id="fileName"></div>

  <div class="or-divider">또는 직접 붙여넣기</div>

  <textarea id="examText" placeholder="시험지 내용을 여기에 붙여넣으세요.&#10;&#10;예)&#10;1. 다음 중 광합성의 산물이 아닌 것은?&#10;① 포도당 ② 산소 ③ 이산화탄소 ④ 물 ⑤ ATP&#10;[배점: 3점]&#10;&#10;정답: ③"></textarea>

  <div class="info-row" style="margin-top:14px;">
    <select id="schoolType">
      <option value="">학교급 선택</option>
      <option value="초등학교">초등학교</option>
      <option value="중학교">중학교</option>
      <option value="고등학교">고등학교</option>
    </select>
    <input type="text" id="subject" placeholder="과목 (예: 과학, 수학)">
    <input type="text" id="totalScore" placeholder="총점 (예: 100)">
  </div>

  <button class="btn-primary" id="checkBtn" onclick="checkExam()">오류 검사 시작</button>
  <div class="privacy-note">🔒 파일은 서버에 저장되지 않습니다</div>
  <div class="error-msg" id="errorMsg"></div>

  <div class="result-box" id="resultBox">
    <div class="result-header">
      <h3>검사 결과</h3>
      <button class="copy-btn" onclick="copyResult()">결과 복사</button>
    </div>
    <div class="loading-msg" id="loadingMsg">
      <div class="spinner"></div>
      AI가 시험지를 검토하는 중입니다...
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const uploadArea = document.getElementById('uploadArea');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file?.type === 'application/pdf') handleFile(file);
  });

  async function handleFile(file) {
    if (!file) return;
    const fileNameEl = document.getElementById('fileName');
    fileNameEl.textContent = `📄 ${file.name}`;
    fileNameEl.style.display = 'block';

    const reader = new FileReader();
    reader.onload = async e => {
      const typedArray = new Uint8Array(e.target.result);
      const pdf = await pdfjsLib.getDocument(typedArray).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(' ') + '\n';
      }
      document.getElementById('examText').value = text;
    };
    reader.readAsArrayBuffer(file);
  }

  async function checkExam() {
    const text = document.getElementById('examText').value.trim();
    const schoolType = document.getElementById('schoolType').value;
    const subject = document.getElementById('subject').value.trim();
    const totalScore = document.getElementById('totalScore').value.trim();
    const btn = document.getElementById('checkBtn');
    const errorMsg = document.getElementById('errorMsg');
    const resultBox = document.getElementById('resultBox');
    const loadingMsg = document.getElementById('loadingMsg');
    const resultBody = document.getElementById('resultBody');

    if (!text) { showError('시험지 내용을 입력하거나 PDF를 업로드해주세요.'); return; }

    errorMsg.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '검사 중...';
    resultBox.style.display = 'block';
    loadingMsg.style.display = 'block';
    resultBody.innerHTML = '';

    try {
      const res = await fetch('/api/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'exam', text, schoolType, subject, totalScore }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '오류가 발생했습니다.');
      loadingMsg.style.display = 'none';
      renderResult(data.issues);
    } catch(e) {
      loadingMsg.style.display = 'none';
      resultBox.style.display = 'none';
      showError(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '오류 검사 시작';
    }
  }

  function renderResult(issues) {
    const body = document.getElementById('resultBody');
    if (!issues?.length) {
      body.innerHTML = '<div class="issue-item issue-ok"><span class="issue-label">✓ 이상 없음</span><div class="issue-title">검토 항목에서 오류가 발견되지 않았습니다.</div></div>';
      return;
    }
    const levelMap = { 높음: 'high', '중간': 'mid', 낮음: 'low', 정보: 'low' };
    body.innerHTML = issues.map(issue => {
      const level = levelMap[issue.level] || 'low';
      return `<div class="issue-item issue-${level}">
        <span class="issue-label">${issue.level} · ${issue.category}</span>
        <div class="issue-title">${escapeHtml(issue.title)}</div>
        <div class="issue-desc">${escapeHtml(issue.desc)}</div>
      </div>`;
    }).join('');
  }

  function copyResult() {
    const issues = document.getElementById('resultBody').querySelectorAll('.issue-item');
    const text = [...issues].map(el => {
      const label = el.querySelector('.issue-label')?.textContent || '';
      const title = el.querySelector('.issue-title')?.textContent || '';
      const desc = el.querySelector('.issue-desc')?.textContent || '';
      return `[${label}] ${title}\n${desc}`;
    }).join('\n\n');
    navigator.clipboard.writeText(text);
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function escapeHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
