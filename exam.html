<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시험지 종합 검토 — 선생님 도구</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

    header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
    header a { text-decoration: none; color: #64748b; font-size: 14px; }
    header h1 { font-size: 16px; font-weight: 700; }

    .main { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 340px; gap: 20px; align-items: start; }
    @media (max-width: 768px) { .main { grid-template-columns: 1fr; padding: 12px; } }

    /* 왼쪽: 문서 영역 */
    .doc-panel { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
    .doc-header { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .doc-header-title { font-size: 14px; font-weight: 600; color: #475569; }

    .upload-zone { padding: 32px 20px; text-align: center; cursor: pointer; }
    .upload-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    .upload-btn { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 10px; border: 2px solid; font-size: 14px; font-weight: 600; cursor: pointer; background: #fff; transition: all 0.15s; }
    .upload-btn.primary { border-color: #2563eb; color: #2563eb; }
    .upload-btn.primary:hover { background: #eff6ff; }
    .upload-btn.camera { border-color: #7c3aed; color: #7c3aed; }
    .upload-btn.camera:hover { background: #f5f3ff; }
    .upload-hint { font-size: 13px; color: #94a3b8; }

    .page-nav { display: none; align-items: center; gap: 12px; }
    .page-nav button { padding: 6px 14px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; transition: all 0.15s; }
    .page-nav button:hover:not(:disabled) { border-color: #2563eb; color: #2563eb; }
    .page-nav button:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { font-size: 13px; color: #64748b; white-space: nowrap; }

    .canvas-wrap { position: relative; display: none; overflow: auto; max-height: 75vh; background: #64748b; }
    #docCanvas { display: block; margin: 0 auto; max-width: 100%; }
    #overlayCanvas { position: absolute; top: 0; left: 50%; transform: translateX(-50%); pointer-events: none; }

    /* 오른쪽: 설정 + 결과 */
    .side-panel { display: flex; flex-direction: column; gap: 16px; }

    .settings-card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; padding: 16px; }
    .settings-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
    select, input[type=text] {
      width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
      font-size: 14px; font-family: inherit; outline: none; background: #fff; margin-bottom: 8px;
    }
    select:focus, input[type=text]:focus { border-color: #2563eb; }

    /* 보조 자료 섹션 */
    .supp-label { font-size: 12px; font-weight: 600; color: #64748b; margin: 4px 0 6px; letter-spacing: 0.02em; }
    .supp-section { border: 1.5px solid #e2e8f0; border-radius: 8px; margin-bottom: 6px; overflow: hidden; }
    .supp-header { padding: 9px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #f8fafc; user-select: none; gap: 6px; }
    .supp-header:hover { background: #f1f5f9; }
    .supp-header-text { font-size: 12px; font-weight: 600; color: #374151; }
    .supp-status { font-size: 11px; color: #94a3b8; margin-left: 3px; }
    .supp-status.ok { color: #16a34a; font-weight: 700; }
    .supp-toggle { font-size: 10px; color: #94a3b8; flex-shrink: 0; }
    .supp-body { padding: 10px; border-top: 1px solid #f1f5f9; display: none; }
    .supp-hint { font-size: 11px; color: #94a3b8; margin-bottom: 6px; line-height: 1.5; }
    .supp-textarea {
      width: 100%; min-height: 68px; border: 1.5px solid #e2e8f0; border-radius: 6px;
      padding: 8px; font-size: 12px; font-family: inherit; resize: vertical;
      outline: none; background: #fff; margin-bottom: 6px; line-height: 1.5;
    }
    .supp-textarea:focus { border-color: #2563eb; }
    .supp-file-row { display: flex; align-items: center; gap: 6px; }
    .supp-file-btn { padding: 5px 9px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 11px; cursor: pointer; background: #fff; color: #475569; flex-shrink: 0; }
    .supp-file-btn:hover { border-color: #7c3aed; color: #7c3aed; }
    .supp-file-name { font-size: 11px; color: #64748b; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .supp-clear { padding: 1px 5px; border: none; background: none; color: #cbd5e1; cursor: pointer; font-size: 14px; flex-shrink: 0; display: none; }
    .supp-clear:hover { color: #ef4444; }

    .analyze-btn {
      width: 100%; padding: 13px; background: #2563eb; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .analyze-btn:hover { background: #1d4ed8; }
    .analyze-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .analyze-btn.all-pages {
      background: #7c3aed; margin-top: 6px; font-size: 13px; padding: 10px;
      display: none;
    }
    .analyze-btn.all-pages:hover:not(:disabled) { background: #6d28d9; }

    .privacy-note { text-align: center; font-size: 11px; color: #22c55e; margin-top: 8px; }

    /* 결과 카드 */
    .result-card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; display: none; }
    .result-card-header { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .result-card-header h3 { font-size: 14px; font-weight: 700; }
    .result-actions { display: flex; gap: 6px; align-items: center; }
    .copy-btn { padding: 5px 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 12px; cursor: pointer; background: #fff; }
    .copy-btn:hover { border-color: #2563eb; color: #2563eb; }
    .clear-result-btn { padding: 5px 10px; border: 1px solid #fecaca; border-radius: 6px; font-size: 11px; cursor: pointer; background: #fff; color: #ef4444; }
    .clear-result-btn:hover { background: #fef2f2; }

    /* 로딩 */
    .loading-state { padding: 28px 16px; text-align: center; }
    .spinner { width: 28px; height: 28px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-main { font-size: 13px; color: #475569; font-weight: 600; }
    .loading-step { font-size: 11px; color: #94a3b8; margin-top: 5px; min-height: 16px; transition: opacity 0.3s; }

    /* 이전 결과 배너 */
    .saved-banner {
      padding: 8px 14px; background: #eff6ff; border-bottom: 1px solid #dbeafe;
      font-size: 11px; color: #2563eb; display: none; align-items: center; justify-content: space-between;
    }

    /* 이슈 목록 */
    .issue-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .issue-item { border-radius: 10px; padding: 11px 13px; border-left: 3px solid; cursor: pointer; transition: all 0.15s; }
    .issue-item:hover { opacity: 0.88; transform: translateX(2px); }
    .issue-high { background: #fef2f2; border-color: #ef4444; }
    .issue-mid  { background: #fffbeb; border-color: #f59e0b; }
    .issue-low  { background: #eff6ff; border-color: #3b82f6; }

    .issue-item-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .issue-num { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .issue-high .issue-num { background: #ef4444; }
    .issue-mid  .issue-num { background: #f59e0b; }
    .issue-low  .issue-num { background: #3b82f6; }

    .issue-page-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; background: #f1f5f9; color: #64748b; flex-shrink: 0; }
    .issue-tag { font-size: 10px; color: #94a3b8; margin-left: auto; }

    .issue-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .issue-desc  { font-size: 12px; color: #475569; line-height: 1.5; }
    .issue-suggestion {
      font-size: 11px; color: #15803d; background: #f0fdf4;
      border-radius: 4px; padding: 4px 8px; margin-top: 5px;
      font-weight: 600; line-height: 1.5;
    }
    .issue-quote {
      font-size: 11px; color: #64748b; font-style: italic;
      background: rgba(0,0,0,0.04); border-radius: 4px;
      padding: 3px 6px; margin-top: 4px;
    }

    .summary-row { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .chip { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .chip-red   { background: #fee2e2; color: #dc2626; }
    .chip-amber { background: #fef3c7; color: #d97706; }
    .chip-blue  { background: #dbeafe; color: #2563eb; }
    .chip-green { background: #dcfce7; color: #16a34a; }
    .page-filter { margin-left: auto; font-size: 11px; color: #64748b; }

    .no-issue { padding: 20px 16px; text-align: center; color: #22c55e; font-size: 14px; font-weight: 600; }
    .error-banner { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 12px 14px; color: #dc2626; font-size: 13px; margin-top: 12px; display: none; white-space: pre-line; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <a href="/">← 홈</a>
  <h1>📝 시험지 종합 검토</h1>
</header>

<div class="main">
  <!-- 왼쪽: 시험지 원안 -->
  <div class="doc-panel">
    <div class="doc-header">
      <span class="doc-header-title" id="docTitle">① 시험지 원안을 업로드해주세요</span>
      <div class="page-nav" id="pageNav">
        <button id="prevBtn" onclick="changePage(-1)" disabled>‹ 이전</button>
        <span class="page-info" id="pageInfo">1 / 1</span>
        <button id="nextBtn" onclick="changePage(1)" disabled>다음 ›</button>
      </div>
    </div>

    <div class="upload-zone" id="uploadZone">
      <div class="upload-btns">
        <button class="upload-btn primary" onclick="document.getElementById('fileInput').click()">
          📄 파일 업로드
        </button>
        <button class="upload-btn camera" onclick="document.getElementById('cameraInput').click()">
          📷 카메라 스캔
        </button>
      </div>
      <p class="upload-hint">PDF · JPG · PNG 지원 · 드래그 앤 드롭 가능</p>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="docCanvas"></canvas>
      <canvas id="overlayCanvas"></canvas>
    </div>

    <input type="file" id="fileInput" accept=".pdf,image/*" style="display:none" onchange="handleFile(this.files[0])">
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this.files[0])">
  </div>

  <!-- 오른쪽: 설정 + 결과 -->
  <div class="side-panel">
    <div class="settings-card">
      <h3>검사 설정</h3>
      <select id="schoolType">
        <option value="중학교" selected>중학교</option>
        <option value="초등학교">초등학교</option>
        <option value="고등학교">고등학교</option>
      </select>
      <input type="text" id="subject" placeholder="과목 (예: 과학, 수학)">
      <input type="text" id="totalScore" placeholder="총점 (예: 100점)">

      <div class="supp-label">보조 자료 첨부 (선택 · 첨부 시 정밀 검토)</div>

      <!-- 문항정보표 -->
      <div class="supp-section">
        <div class="supp-header" onclick="toggleSupp('itemTable')">
          <span class="supp-header-text">📊 문항정보표 <span class="supp-status" id="itemTableStatus">미첨부</span></span>
          <span class="supp-toggle" id="itemTableToggle">▼</span>
        </div>
        <div class="supp-body" id="itemTableBody">
          <div class="supp-file-row">
            <button class="supp-file-btn" onclick="document.getElementById('itemTableFile').click()">📄 파일 업로드</button>
            <button class="supp-file-btn" onclick="document.getElementById('itemTableCamera').click()">📷 카메라 스캔</button>
            <span class="supp-file-name" id="itemTableImgName"></span>
            <button class="supp-clear" id="itemTableClear" onclick="clearSupp('itemTable')">✕</button>
          </div>
          <input type="file" id="itemTableFile" accept=".pdf,image/*" style="display:none"
            onchange="handleSuppFile('itemTable', this.files[0])">
          <input type="file" id="itemTableCamera" accept="image/*" capture="environment" style="display:none"
            onchange="handleSuppFile('itemTable', this.files[0])">
          <p class="supp-hint" style="margin-top:8px">또는 텍스트로 붙여넣기</p>
          <textarea class="supp-textarea" id="itemTableText"
            placeholder="문항번호·내용영역·성취기준·난이도·정답·배점..."
            oninput="updateSuppStatus('itemTable')"></textarea>
        </div>
      </div>

      <!-- 서답형 채점기준표 -->
      <div class="supp-section">
        <div class="supp-header" onclick="toggleSupp('scoringTable')">
          <span class="supp-header-text">📋 서답형 채점기준표 <span class="supp-status" id="scoringTableStatus">미첨부</span></span>
          <span class="supp-toggle" id="scoringTableToggle">▼</span>
        </div>
        <div class="supp-body" id="scoringTableBody">
          <div class="supp-file-row">
            <button class="supp-file-btn" onclick="document.getElementById('scoringTableFile').click()">📄 파일 업로드</button>
            <button class="supp-file-btn" onclick="document.getElementById('scoringTableCamera').click()">📷 카메라 스캔</button>
            <span class="supp-file-name" id="scoringTableImgName"></span>
            <button class="supp-clear" id="scoringTableClear" onclick="clearSupp('scoringTable')">✕</button>
          </div>
          <input type="file" id="scoringTableFile" accept=".pdf,image/*" style="display:none"
            onchange="handleSuppFile('scoringTable', this.files[0])">
          <input type="file" id="scoringTableCamera" accept="image/*" capture="environment" style="display:none"
            onchange="handleSuppFile('scoringTable', this.files[0])">
          <p class="supp-hint" style="margin-top:8px">또는 텍스트로 붙여넣기</p>
          <textarea class="supp-textarea" id="scoringTableText"
            placeholder="문항번호·기본답안·인정답안·부분점수 기준..."
            oninput="updateSuppStatus('scoringTable')"></textarea>
        </div>
      </div>

      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()" disabled>오류 검사 시작</button>
      <button class="analyze-btn all-pages" id="allPagesBtn" onclick="analyzeAll()" disabled>전체 페이지 검사</button>
      <div class="privacy-note">🔒 파일은 서버에 저장되지 않습니다</div>
      <div class="error-banner" id="errorBanner"></div>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-card-header">
        <h3>검사 결과</h3>
        <div class="result-actions">
          <button class="copy-btn" onclick="copyResult()">결과 복사</button>
          <button class="clear-result-btn" onclick="clearResult()">지우기</button>
        </div>
      </div>
      <div class="saved-banner" id="savedBanner">
        💾 이전 분석 결과
      </div>
      <div class="loading-state" id="loadingState" style="display:none">
        <div class="spinner"></div>
        <div class="loading-main" id="loadingMain">AI가 시험지를 분석하는 중입니다...</div>
        <div class="loading-step" id="loadingStep"></div>
      </div>
      <div id="resultContent"></div>
    </div>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfDoc = null;
  let currentPage = 1;
  let totalPages = 1;
  let pageImages = {};
  let currentIssues = [];
  let itemTableImageData = null;
  let scoringTableImageData = null;
  let loadingTimer = null;

  const LOADING_STEPS = [
    '문항 번호와 배점을 확인하는 중...',
    '오탈자·맞춤법을 검사하는 중...',
    '서답형 기준을 검토하는 중...',
    '오류 위치를 파악하는 중...',
    '결과를 정리하는 중...',
  ];

  // 드래그 앤 드롭
  const zone = document.getElementById('uploadZone');
  const canvasWrap = document.getElementById('canvasWrap');
  ['dragover','dragenter'].forEach(e => document.addEventListener(e, ev => { ev.preventDefault(); zone.style.borderColor = '#2563eb'; }));
  document.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
  document.addEventListener('drop', ev => {
    ev.preventDefault();
    const file = ev.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  // 페이지 로드 시 저장된 결과 복원
  window.addEventListener('DOMContentLoaded', () => {
    const saved = loadFromStorage();
    if (saved?.issues?.length) {
      currentIssues = saved.issues;
      const resultCard = document.getElementById('resultCard');
      const resultContent = document.getElementById('resultContent');
      const savedBanner = document.getElementById('savedBanner');
      const isMulti = currentIssues.some(i => i.pageNum);
      resultCard.style.display = 'block';
      savedBanner.style.display = 'flex';
      renderResult(currentIssues, resultContent, isMulti);
    }
  });

  async function handleFile(file) {
    if (!file) return;
    document.getElementById('errorBanner').style.display = 'none';
    document.getElementById('docTitle').textContent = file.name;
    document.getElementById('uploadZone').style.display = 'none';
    canvasWrap.style.display = 'block';

    if (file.type === 'application/pdf') {
      await loadPDF(file);
    } else if (file.type.startsWith('image/')) {
      await loadImage(file);
    } else {
      showError('PDF 또는 이미지 파일만 지원합니다.');
    }
  }

  async function loadPDF(file) {
    const arrayBuffer = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument(new Uint8Array(arrayBuffer)).promise;
    totalPages = pdfDoc.numPages;
    currentPage = 1;
    pageImages = {};

    if (totalPages > 1) {
      document.getElementById('pageNav').style.display = 'flex';
      document.getElementById('allPagesBtn').style.display = 'block';
    }
    await renderPage(currentPage);
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('allPagesBtn').disabled = false;
  }

  async function loadImage(file) {
    pdfDoc = null;
    totalPages = 1;
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const canvas = document.getElementById('docCanvas');
      const maxW = canvasWrap.clientWidth || 700;
      const scale = Math.min(1, maxW / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      syncOverlay(canvas);
      pageImages[1] = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
      document.getElementById('analyzeBtn').disabled = false;
    };
    img.src = url;
  }

  async function renderPage(pageNum) {
    const page = await pdfDoc.getPage(pageNum);
    const maxW = canvasWrap.clientWidth || 700;
    const unscaled = page.getViewport({ scale: 1 });
    const scale = Math.min(2, maxW / unscaled.width);
    const viewport = page.getViewport({ scale });

    const canvas = document.getElementById('docCanvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

    syncOverlay(canvas);
    pageImages[pageNum] = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
    updatePageNav();
    clearOverlay();
    if (currentIssues.length) drawAnnotations(getPageIssues(pageNum));
  }

  function syncOverlay(canvas) {
    const overlay = document.getElementById('overlayCanvas');
    overlay.width = canvas.width;
    overlay.height = canvas.height;
    overlay.style.width = canvas.width + 'px';
    overlay.style.height = canvas.height + 'px';
  }

  function changePage(delta) {
    const next = currentPage + delta;
    if (next < 1 || next > totalPages) return;
    currentPage = next;
    renderPage(currentPage);
  }

  function updatePageNav() {
    document.getElementById('pageInfo').textContent = `${currentPage} / ${totalPages}`;
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
  }

  function getPageIssues(pageNum) {
    return currentIssues.filter(i => !i.pageNum || i.pageNum === pageNum);
  }

  // 보조 자료
  function toggleSupp(id) {
    const body = document.getElementById(id + 'Body');
    const toggle = document.getElementById(id + 'Toggle');
    const isOpen = body.style.display !== 'none';
    body.style.display = isOpen ? 'none' : 'block';
    toggle.textContent = isOpen ? '▼' : '▲';
  }

  function updateSuppStatus(id) {
    const text = document.getElementById(id + 'Text')?.value.trim();
    const hasImg = id === 'itemTable' ? !!itemTableImageData : !!scoringTableImageData;
    const hasContent = !!(text || hasImg);
    const statusEl = document.getElementById(id + 'Status');
    const clearBtn = document.getElementById(id + 'Clear');
    statusEl.textContent = hasContent ? '✓ 첨부됨' : '미첨부';
    statusEl.className = 'supp-status' + (hasContent ? ' ok' : '');
    clearBtn.style.display = hasContent ? '' : 'none';
  }

  async function loadPdfAsImage(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument(new Uint8Array(arrayBuffer)).promise;
    const canvases = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 1.5 });
      const c = document.createElement('canvas');
      c.width = viewport.width; c.height = viewport.height;
      await page.render({ canvasContext: c.getContext('2d'), viewport }).promise;
      canvases.push(c);
    }
    if (canvases.length === 1) return canvases[0].toDataURL('image/jpeg', 0.85).split(',')[1];
    const totalW = Math.max(...canvases.map(c => c.width));
    const totalH = canvases.reduce((s, c) => s + c.height, 0);
    const stitched = document.createElement('canvas');
    stitched.width = totalW; stitched.height = totalH;
    const ctx = stitched.getContext('2d');
    let y = 0;
    for (const c of canvases) { ctx.drawImage(c, 0, y); y += c.height; }
    return stitched.toDataURL('image/jpeg', 0.82).split(',')[1];
  }

  async function handleSuppFile(id, file) {
    if (!file) return;
    let base64;
    if (file.type === 'application/pdf') {
      base64 = await loadPdfAsImage(file);
    } else if (file.type.startsWith('image/')) {
      base64 = await new Promise(res => {
        const reader = new FileReader();
        reader.onload = e => res(e.target.result.split(',')[1]);
        reader.readAsDataURL(file);
      });
    } else { return; }
    if (id === 'itemTable') itemTableImageData = base64;
    else scoringTableImageData = base64;
    document.getElementById(id + 'ImgName').textContent = file.name;
    updateSuppStatus(id);
  }

  function clearSupp(id) {
    if (id === 'itemTable') itemTableImageData = null;
    else scoringTableImageData = null;
    const textEl = document.getElementById(id + 'Text');
    if (textEl) textEl.value = '';
    ['File','Camera'].forEach(s => { const el = document.getElementById(id + s); if (el) el.value = ''; });
    document.getElementById(id + 'ImgName').textContent = '';
    updateSuppStatus(id);
  }

  // 로딩 애니메이션
  function startLoadingAnim(label) {
    let step = 0;
    const mainEl = document.getElementById('loadingMain');
    const stepEl = document.getElementById('loadingStep');
    mainEl.textContent = label || 'AI가 시험지를 분석하는 중입니다...';
    stepEl.textContent = LOADING_STEPS[0];
    loadingTimer = setInterval(() => {
      step = (step + 1) % LOADING_STEPS.length;
      stepEl.textContent = LOADING_STEPS[step];
    }, 3500);
  }

  function stopLoadingAnim() {
    if (loadingTimer) { clearInterval(loadingTimer); loadingTimer = null; }
    document.getElementById('loadingStep').textContent = '';
  }

  function buildRequestBody(imageData, pageOverride) {
    const itemTableText = document.getElementById('itemTableText').value.trim();
    const scoringTableText = document.getElementById('scoringTableText').value.trim();
    return {
      type: 'exam',
      imageData,
      schoolType: document.getElementById('schoolType').value,
      subject: document.getElementById('subject').value,
      totalScore: document.getElementById('totalScore').value,
      itemTableText: itemTableText || undefined,
      itemTableImage: pageOverride ? undefined : (itemTableImageData || undefined),
      scoringTableText: pageOverride ? undefined : (scoringTableText || undefined),
      scoringTableImage: pageOverride ? undefined : (scoringTableImageData || undefined),
    };
  }

  // 현재 페이지 분석
  async function analyze() {
    const imageData = pageImages[currentPage];
    if (!imageData) { showError('시험지를 먼저 업로드해주세요.'); return; }

    setAnalyzing(true);
    document.getElementById('savedBanner').style.display = 'none';

    try {
      startLoadingAnim();
      const res = await fetch('/api/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(buildRequestBody(imageData)),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '오류가 발생했습니다.');

      stopLoadingAnim();
      currentIssues = data.issues || [];
      finishAnalysis(currentIssues, false);
    } catch(e) {
      stopLoadingAnim();
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('resultCard').style.display = 'none';
      showError(e.message);
    } finally {
      setAnalyzing(false);
    }
  }

  // 전체 페이지 분석
  async function analyzeAll() {
    if (!pdfDoc) return;

    setAnalyzing(true);
    document.getElementById('savedBanner').style.display = 'none';

    const allIssues = [];
    try {
      for (let p = 1; p <= totalPages; p++) {
        if (!pageImages[p]) { currentPage = p; await renderPage(p); }
        startLoadingAnim(`${p} / ${totalPages} 페이지 분석 중...`);

        const res = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(buildRequestBody(pageImages[p], p > 1)),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(`${p}페이지 오류: ${data.error || '알 수 없는 오류'}`);

        (data.issues || []).forEach(issue => allIssues.push({ ...issue, pageNum: p }));
      }

      stopLoadingAnim();
      currentIssues = allIssues;

      // 1페이지로 이동
      if (currentPage !== 1) { currentPage = 1; await renderPage(1); }
      finishAnalysis(allIssues, true);
    } catch(e) {
      stopLoadingAnim();
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('resultCard').style.display = 'none';
      showError(e.message);
    } finally {
      setAnalyzing(false);
    }
  }

  function setAnalyzing(on) {
    const btn = document.getElementById('analyzeBtn');
    const allBtn = document.getElementById('allPagesBtn');
    btn.disabled = on;
    allBtn.disabled = on;
    btn.textContent = on ? '분석 중...' : '오류 검사 시작';
    if (on) {
      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('resultContent').innerHTML = '';
      clearOverlay();
    }
  }

  function finishAnalysis(issues, isMulti) {
    document.getElementById('loadingState').style.display = 'none';
    renderResult(issues, document.getElementById('resultContent'), isMulti);
    drawAnnotations(getPageIssues(currentPage));
    saveToStorage(issues);
  }

  // 어노테이션
  const ANNOT_COLORS = { 높음: '#ef4444', 중간: '#f59e0b', 낮음: '#3b82f6', 정보: '#64748b' };
  const ANNOT_FILLS  = { 높음: 'rgba(239,68,68,0.13)', 중간: 'rgba(245,158,11,0.13)', 낮음: 'rgba(59,130,246,0.13)', 정보: 'rgba(100,116,135,0.10)' };

  function drawAnnotations(issues) {
    const overlay = document.getElementById('overlayCanvas');
    const ctx = overlay.getContext('2d');
    ctx.clearRect(0, 0, overlay.width, overlay.height);
    const W = overlay.width, H = overlay.height;

    issues.forEach((issue, i) => {
      const bb = issue.boundingBox;
      if (!bb) return;
      const x = (bb.x_min / 1000) * W;
      const y = (bb.y_min / 1000) * H;
      const w = ((bb.x_max - bb.x_min) / 1000) * W;
      const h = ((bb.y_max - bb.y_min) / 1000) * H;
      const color = ANNOT_COLORS[issue.level] || '#3b82f6';

      ctx.fillStyle = ANNOT_FILLS[issue.level] || 'rgba(59,130,246,0.13)';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);

      const br = 11;
      const bx = x + br, by2 = Math.max(br, y - br);
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(bx, by2, br, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(i + 1, bx, by2);

      drawCallout(ctx, issue, x, y, w, h, color, W, H);
    });
  }

  function drawCallout(ctx, issue, bx, by, bw, bh, color, W, H) {
    const NW = 185, PAD = 8, TFS = 12, DFS = 10.5, SFS = 10.5, QFS = 10, LHT = 16, LHD = 14, LHQ = 13;

    ctx.font = `bold ${TFS}px -apple-system,"Apple SD Gothic Neo",sans-serif`;
    const tLines = wrapCanvasText(ctx, issue.title || '', NW - PAD * 2 - 6);

    ctx.font = `${DFS}px -apple-system,"Apple SD Gothic Neo",sans-serif`;
    const dAll = wrapCanvasText(ctx, issue.desc || '', NW - PAD * 2 - 6);
    const dLines = dAll.slice(0, 2);
    const hasMore = dAll.length > 2;

    const sText = issue.suggestion ? `→ ${issue.suggestion}` : null;
    ctx.font = `${SFS}px -apple-system,"Apple SD Gothic Neo",sans-serif`;
    const sLines = sText ? wrapCanvasText(ctx, sText, NW - PAD * 2 - 6).slice(0, 2) : [];

    const qText = issue.quote ? `"${issue.quote}"` : null;
    ctx.font = `italic ${QFS}px -apple-system,"Apple SD Gothic Neo",sans-serif`;
    const qLines = qText ? wrapCanvasText(ctx, qText, NW - PAD * 2 - 6).slice(0, 1) : [];

    const NH = PAD
      + tLines.length * LHT + 4
      + dLines.length * LHD + (hasMore ? LHD : 0)
      + (sLines.length ? 4 + sLines.length * LHD : 0)
      + (qLines.length ? 4 + qLines.length * LHQ : 0)
      + PAD;

    let nx = bx + bw + 10;
    if (nx + NW > W - 4) nx = bx - NW - 10;
    if (nx < 2) nx = 2;
    let ny = by;
    if (ny + NH > H - 4) ny = H - NH - 4;
    if (ny < 2) ny = 2;

    ctx.save();
    ctx.setLineDash([4, 3]);
    ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.moveTo(bx + bw < nx ? bx + bw : bx, by + bh / 2);
    ctx.lineTo(bx + bw < nx ? nx : nx + NW, ny + NH / 2);
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.18)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 2;
    ctx.fillStyle = '#fff';
    roundRect(ctx, nx, ny, NW, NH, 6); ctx.fill();
    ctx.restore();

    ctx.fillStyle = color;
    roundRect(ctx, nx, ny, 4, NH, [6, 0, 0, 6]); ctx.fill();

    ctx.font = `bold ${TFS}px -apple-system,"Apple SD Gothic Neo",sans-serif`;
    ctx.fillStyle = '#1e293b'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    let ty = ny + PAD;
    tLines.forEach(line => { ctx.fillText(line, nx + PAD + 5, ty); ty += LHT; });

    ty += 4;
    ctx.font = `${DFS}px -apple-system,"Apple SD Gothic Neo",sans-serif`;
    ctx.fillStyle = '#64748b';
    dLines.forEach(line => { ctx.fillText(line, nx + PAD + 5, ty); ty += LHD; });
    if (hasMore) { ctx.fillStyle = '#94a3b8'; ctx.fillText('↗ 오른쪽 패널에서 전체 확인', nx + PAD + 5, ty); ty += LHD; }

    if (sLines.length) {
      ty += 4;
      ctx.fillStyle = 'rgba(21,128,61,0.08)';
      ctx.fillRect(nx + PAD + 3, ty - 2, NW - PAD * 2 - 3, sLines.length * LHD + 4);
      ctx.font = `bold ${SFS}px -apple-system,"Apple SD Gothic Neo",sans-serif`;
      ctx.fillStyle = '#15803d';
      sLines.forEach(line => { ctx.fillText(line, nx + PAD + 6, ty); ty += LHD; });
    }

    if (qLines.length) {
      ty += 4;
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(nx + PAD + 3, ty - 2, NW - PAD * 2 - 3, qLines.length * LHQ + 4);
      ctx.font = `italic ${QFS}px -apple-system,"Apple SD Gothic Neo",sans-serif`;
      ctx.fillStyle = '#475569';
      qLines.forEach(line => { ctx.fillText(line, nx + PAD + 6, ty); ty += LHQ; });
    }
  }

  function wrapCanvasText(ctx, text, maxW) {
    const lines = []; let cur = '';
    for (const ch of text) {
      const test = cur + ch;
      if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = ch; }
      else cur = test;
    }
    if (cur) lines.push(cur);
    return lines;
  }

  function roundRect(ctx, x, y, w, h, r) {
    const [tl, tr, br, bl] = typeof r === 'number' ? [r, r, r, r] : r;
    ctx.beginPath();
    ctx.moveTo(x + tl, y); ctx.lineTo(x + w - tr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + tr);
    ctx.lineTo(x + w, y + h - br);
    ctx.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    ctx.lineTo(x + bl, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - bl);
    ctx.lineTo(x, y + tl);
    ctx.quadraticCurveTo(x, y, x + tl, y);
    ctx.closePath();
  }

  async function highlightIssue(index) {
    const issue = currentIssues[index];
    if (!issue) return;

    // 다른 페이지면 먼저 이동
    if (issue.pageNum && issue.pageNum !== currentPage) {
      currentPage = issue.pageNum;
      await renderPage(currentPage);
    }

    if (!issue.boundingBox) return;

    const overlay = document.getElementById('overlayCanvas');
    const bb = issue.boundingBox;
    const y = (bb.y_min / 1000) * overlay.height;
    canvasWrap.scrollTo({ top: y - 60, behavior: 'smooth' });

    const pageIssues = getPageIssues(currentPage);
    drawAnnotations(pageIssues);

    const ctx = overlay.getContext('2d');
    const x = (bb.x_min / 1000) * overlay.width;
    const w = ((bb.x_max - bb.x_min) / 1000) * overlay.width;
    const h = ((bb.y_max - bb.y_min) / 1000) * overlay.height;
    ctx.fillStyle = 'rgba(239,68,68,0.22)';
    ctx.fillRect(x, y, w, h);
    setTimeout(() => drawAnnotations(pageIssues), 600);
  }

  function clearOverlay() {
    const overlay = document.getElementById('overlayCanvas');
    overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
  }

  function renderResult(issues, container, isMulti = false) {
    if (!issues.length) {
      container.innerHTML = '<div class="no-issue">✅ 오류가 발견되지 않았습니다</div>';
      return;
    }
    const high = issues.filter(i => i.level === '높음').length;
    const mid  = issues.filter(i => i.level === '중간').length;
    const low  = issues.filter(i => ['낮음','정보'].includes(i.level)).length;
    const levelCls = { 높음: 'high', 중간: 'mid', 낮음: 'low', 정보: 'low' };

    container.innerHTML =
      `<div class="summary-row">
        ${high ? `<span class="chip chip-red">⚠ 높음 ${high}</span>` : ''}
        ${mid  ? `<span class="chip chip-amber">! 중간 ${mid}</span>` : ''}
        ${low  ? `<span class="chip chip-blue">ℹ 참고 ${low}</span>` : ''}
        ${isMulti ? `<span class="page-filter">${totalPages}페이지 전체</span>` : ''}
      </div>
      <div class="issue-list">
        ${issues.map((issue, i) => {
          const cls = levelCls[issue.level] || 'low';
          return `<div class="issue-item issue-${cls}" onclick="highlightIssue(${i})">
            <div class="issue-item-top">
              <span class="issue-num">${i + 1}</span>
              ${isMulti && issue.pageNum ? `<span class="issue-page-badge">${issue.pageNum}p</span>` : ''}
              <span class="issue-tag">${escapeHtml(issue.category)}</span>
            </div>
            <div class="issue-title">${escapeHtml(issue.title)}</div>
            <div class="issue-desc">${escapeHtml(issue.desc)}</div>
            ${issue.suggestion ? `<div class="issue-suggestion">→ ${escapeHtml(issue.suggestion)}</div>` : ''}
            ${issue.quote ? `<div class="issue-quote">"${escapeHtml(issue.quote)}"</div>` : ''}
          </div>`;
        }).join('')}
      </div>`;
  }

  function clearResult() {
    currentIssues = [];
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('savedBanner').style.display = 'none';
    clearOverlay();
    localStorage.removeItem('clinamen_exam_result');
  }

  function copyResult() {
    const text = currentIssues.map((issue, i) => {
      let s = `[${i+1}] ${issue.level} · ${issue.category}\n${issue.title}\n${issue.desc}`;
      if (issue.suggestion) s += `\n→ ${issue.suggestion}`;
      if (issue.quote) s += `\n원문: "${issue.quote}"`;
      return s;
    }).join('\n\n');
    navigator.clipboard.writeText(text);
  }

  function saveToStorage(issues) {
    try {
      localStorage.setItem('clinamen_exam_result', JSON.stringify({ issues, ts: Date.now() }));
    } catch(e) {}
  }

  function loadFromStorage() {
    try {
      const saved = JSON.parse(localStorage.getItem('clinamen_exam_result'));
      if (saved && Date.now() - saved.ts < 24 * 3600 * 1000) return saved;
    } catch(e) {}
    return null;
  }

  function showError(msg) {
    const el = document.getElementById('errorBanner');
    el.textContent = msg; el.style.display = 'block';
  }

  function escapeHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
